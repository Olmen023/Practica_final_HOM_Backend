services:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bildyapp-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/bildyapp
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: bildyapp-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s

volumes:
  mongo_data:
    name: bildyapp_mongo_data
